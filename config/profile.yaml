tone:
  default: "tactical/actionable" # options: conversational-expert | sharp-opinionated | storytelling | tactical/actionable
  voice_notes: |
    - No fluff. Lead with the problem, deliver the fix.
    - Write for someone mid-scroll who has 5 seconds to decide if this is worth reading.
    - Never brag. Frame everything as useful to the reader.
    - Speak like a peer, not a guru.
    - AI is a tool, not a topic. Describe what can be done with it, not what it is.
    - Hooks should create real tension or urgency — not "here's a cool thing we built." Go provocative. Raise stakes. Make the reader feel something is at risk if they keep scrolling past.
    - When illustrating pain points or use cases, use examples that feature the reader's CUSTOMERS, not the reader themselves. A plumber already knows he's a plumber — show him his customer at 2am with a burst pipe.
    - Every claim needs a receipt — use real numbers (450% sales growth, 413% donation increase). Exception: for brand-new product or feature announcements where no data exists yet, ship without receipts but plan a follow-up post in 30-60 days with early results.
    - Short sentences. If it has a comma, consider splitting it.
    - Sound like a smart person at a coffee meeting, not a marketing team writing a press release.
    - Never say: leverage, seamless, revolutionary, game-changing, cutting-edge, empower, AI-powered.
    - Never position by comparing or contrasting with competitors ("most agencies," "everyone else," "unlike other"). Express expertise through what you bring, not what others get wrong.
    - Lead CTAs with the contact form (smartsite.studio/contact) — Daniel prefers form leads because they let him respond on his own schedule. But include the phone number (248-509-4543) as a secondary option for audiences who prefer to call (trades, service businesses). Format: "Reach out at smartsite.studio/contact, or call us at 248-509-4543." Form first, phone second. Never lead with the phone, never omit it entirely.

content_rules:
  linkedin:
    hook_max_chars: 110          # ~2 short lines before "… more"
    hook_style: "pattern-interrupt"
    never:
      - Start with "I"
      - Use emoji in the hook
      - Include hashtags in the hook
      - Sound like a personal achievement post
      - Use "leverage," "seamless," "game-changing,", etc
      - Lead with AI hype — lead with the business problem AI solves
      - Compare or contrast with competitors ("most agencies," "everyone else," etc)
    always:
      - Make the hook about the READER or a universal tension
      - Create an open loop (unanswered question, contradiction, bold claim)
      - End with a clear reason to follow
      - Include at least one specific number or concrete example
      - Frame AI in terms of what it does, not what it is
      - Put external links in the FIRST COMMENT, not the post body — LinkedIn algorithm penalizes outbound links. End the post with "Link in the comments."
      - Draft a SECOND COMMENT designed to invite conversation (open question or invitation) to drop 2-3 minutes after posting — this drives engagement more than post edits
  article:
    min_words: 600
    max_words: 2000
    structure: "problem → insight → actionable takeaway"
